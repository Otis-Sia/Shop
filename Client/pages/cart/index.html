<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - ShopHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../global.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header id="main-header"></header>
    
    <main id="main-content">
        <div class="page-header">
            <h1>🛒 Shopping Cart</h1>
        </div>
        
        <div class="cart-layout">
            <div class="cart-items" id="cart-items">
                <p style="text-align: center;"><span class="loading"></span> Loading your cart...</p>
            </div>
            
            <div class="cart-summary">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="cart-subtotal">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Shipping:</span>
                    <span>FREE</span>
                </div>
                <div class="summary-row" style="border: none;">
                    <span class="summary-total">Total:</span>
                    <span class="summary-total" id="cart-total">$0.00</span>
                </div>
                <a href="../checkout/" class="btn btn-primary" style="width: 100%; text-align: center; display: block;">Proceed to Checkout</a>
                <a href="../products/" class="btn btn-secondary" style="width: 100%; text-align: center; display: block; margin-top: 0.5rem;">Continue Shopping</a>
            </div>
        </div>
    </main>
    
    <footer id="main-footer"></footer>
    
    <script type="module" src="../../global.js"></script>
    <script type="module" src="./script.js"></script>
</body>
</html>
